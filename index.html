<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画像・動画 一括リネーム＆圧縮ツール</title>
    
    <!-- GitHub Pages等でFFmpegを動かすためのセキュリティ解除スクリプト -->
    <script src="coi-serviceworker.min.js"></script>
    
    <!-- Tailwind CSS (デザイン用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- JSZip (ZIPファイル作成用) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- FFmpeg.wasm (動画変換用) -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        /* カスタムスクロールバー */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* ドロップ先のインジケーター用スタイル */
        .drop-target-before {
            box-shadow: 0 -3px 0 0 #3b82f6 !important; 
            z-index: 10;
            position: relative;
        }
        .drop-target-after {
            box-shadow: 0 3px 0 0 #3b82f6 !important;  
            z-index: 10;
            position: relative;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 font-sans text-slate-800 flex items-start justify-center">

<div class="w-full max-w-3xl mx-auto space-y-6">
    
    <header class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-slate-900 flex items-center justify-center tracking-tight">
            <svg class="w-8 h-8 mr-3 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            Media Converter Pro
        </h1>
        <p class="text-slate-500 mt-2 text-sm font-medium">ブラウザ完結型の画像・動画一括リネーム＆圧縮ツール</p>
    </header>

    <div class="space-y-6">
        
        <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div class="flex items-center mb-4">
                <span class="bg-blue-100 text-blue-700 text-xs font-bold px-2.5 py-1 rounded-full mr-2">STEP 1</span>
                <h2 class="text-lg font-bold text-slate-800">変換モードを選択</h2>
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <label class="cursor-pointer relative block">
                    <input type="radio" name="mediaType" value="image" class="peer sr-only" checked>
                    <div class="rounded-xl border-2 border-slate-200 bg-white p-4 text-center hover:bg-slate-50 peer-checked:border-blue-500 peer-checked:bg-blue-50 transition-all shadow-sm">
                        <svg class="w-8 h-8 mx-auto mb-2 text-slate-400 peer-checked:text-blue-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <span class="block text-base font-bold text-slate-700 peer-checked:text-blue-700 transition-colors">画像</span>
                        <span class="block text-xs mt-1 text-slate-500 peer-checked:text-blue-600 transition-colors">JPGに変換</span>
                    </div>
                </label>
                <label class="cursor-pointer relative block">
                    <input type="radio" name="mediaType" value="video" class="peer sr-only">
                    <div class="rounded-xl border-2 border-slate-200 bg-white p-4 text-center hover:bg-slate-50 peer-checked:border-blue-500 peer-checked:bg-blue-50 transition-all shadow-sm">
                        <svg class="w-8 h-8 mx-auto mb-2 text-slate-400 peer-checked:text-blue-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        <span class="block text-base font-bold text-slate-700 peer-checked:text-blue-700 transition-colors">動画</span>
                        <span class="block text-xs mt-1 text-slate-500 peer-checked:text-blue-600 transition-colors">MP4に変換</span>
                    </div>
                </label>
            </div>
            
            <div id="videoOptions" class="mt-4 hidden animate-fade-in">
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" id="compressVideo" class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500" checked>
                        <span class="ml-2 text-sm font-bold text-slate-700">動画を10MB以下に圧縮する</span>
                    </label>
                    <p class="text-xs text-slate-500 mt-2 ml-6 leading-relaxed">
                        ※ブラウザ上で再変換するため時間がかかります。<br>
                        短めの動画（1分以内推奨）でご使用ください。
                    </p>
                </div>
            </div>
        </section>

        <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div class="flex items-center mb-4">
                <span class="bg-blue-100 text-blue-700 text-xs font-bold px-2.5 py-1 rounded-full mr-2">STEP 2</span>
                <h2 class="text-lg font-bold text-slate-800">出力ルールの設定</h2>
            </div>
            
            <div class="space-y-4 sm:space-y-0 sm:flex sm:gap-4">
                <div class="sm:w-1/3">
                    <label for="startNumberInput" class="block text-xs font-bold text-slate-500 mb-1">開始連番</label>
                    <input type="number" id="startNumberInput" value="1" min="0" 
                           class="w-full text-sm text-slate-800 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors outline-none">
                </div>
                <div class="sm:flex-1">
                    <label for="zipNameInput" class="block text-xs font-bold text-slate-500 mb-1">ZIPファイル名</label>
                    <div class="flex items-center">
                        <input type="text" id="zipNameInput" value="renamed_files" placeholder="ファイル名を入力"
                               class="flex-1 text-sm text-slate-800 bg-slate-50 border border-slate-200 rounded-l-lg px-3 py-2.5 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors outline-none z-10">
                        <span class="bg-slate-100 border border-l-0 border-slate-200 text-slate-500 text-sm font-bold px-3 py-2.5 rounded-r-lg">.zip</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col overflow-hidden">
            
            <div class="p-6 border-b border-slate-100">
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-4 gap-3">
                    <div class="flex items-center">
                        <span class="bg-blue-100 text-blue-700 text-xs font-bold px-2.5 py-1 rounded-full mr-2">STEP 3</span>
                        <h2 class="text-lg font-bold text-slate-800">ファイルを追加して確認</h2>
                    </div>
                    
                    <div class="flex items-center gap-2 self-end sm:self-auto">
                        <button id="selectAllBtn" type="button" class="hidden text-xs font-bold bg-slate-100 text-slate-600 hover:bg-slate-200 px-3 py-1.5 rounded-lg transition-colors focus:outline-none shadow-sm whitespace-nowrap">
                            全選択/解除
                        </button>
                        <button id="sortBtn" type="button" class="hidden text-xs font-bold bg-blue-50 text-blue-600 hover:bg-blue-100 px-3 py-1.5 rounded-lg transition-colors focus:outline-none shadow-sm whitespace-nowrap" title="名前順に並べ替え">
                            <svg class="w-4 h-4 inline-block mr-1 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h13M3 8h9m-9 4h6m4 0l4-4m0 0l4 4m-4-4v12"></path></svg>名前順
                        </button>
                        <button id="clearAllBtn" type="button" class="hidden text-xs font-bold bg-red-50 text-red-600 hover:bg-red-100 px-3 py-1.5 rounded-lg transition-colors focus:outline-none shadow-sm whitespace-nowrap" title="すべてクリア">
                            <svg class="w-4 h-4 inline-block mr-1 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>クリア
                        </button>
                    </div>
                </div>

                <div id="dropZone" class="flex flex-col items-center justify-center w-full h-28 border-2 border-dashed border-slate-300 rounded-xl bg-slate-50 hover:bg-slate-100 hover:border-blue-400 transition-all cursor-pointer relative overflow-hidden group">
                    <div class="flex flex-col items-center justify-center pt-5 pb-6 pointer-events-none">
                        <svg class="w-8 h-8 mb-2 text-slate-400 group-hover:text-blue-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                        <p class="text-sm text-slate-600 font-semibold group-hover:text-blue-600 transition-colors">クリック または ドロップして追加</p>
                    </div>
                    <input type="file" id="fileInput" accept="image/*" multiple class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                </div>
                <p id="videoWarning" class="mt-2 text-xs text-amber-600 hidden font-medium">※動画は処理が重いため、一度に数個〜10個程度ずつの追加をおすすめします。</p>
            </div>

            <div class="bg-slate-50/50 p-4 border-b border-slate-100">
                <div id="previewArea" class="overflow-y-auto max-h-[50vh] min-h-[200px] pr-2">
                    <div class="h-full flex flex-col items-center justify-center text-slate-400 opacity-70">
                        <svg class="w-12 h-12 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        <p class="text-sm font-medium">追加されたファイルがここに表示されます</p>
                    </div>
                </div>
            </div>

            <div class="p-6 bg-white">
                <button id="processBtn" disabled class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-md hover:shadow-lg transition-all duration-200 flex justify-center items-center disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:shadow-md transform active:scale-[0.99]">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    <span id="processBtnText">変換するファイルを追加してください</span>
                </button>
                
                <div id="progressContainer" class="mt-4 hidden w-full">
                    <div class="flex justify-between items-center mb-1 text-xs font-bold text-blue-700">
                        <span id="progressText">変換処理中...</span>
                        <span id="progressPercent">0%</span>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden">
                        <div id="progressBar" class="bg-blue-500 h-2 rounded-full transition-all duration-300 ease-out relative" style="width: 0%">
                            <div class="absolute top-0 left-0 bottom-0 right-0 bg-white opacity-20" style="animation: shimmer 1s infinite linear;"></div>
                        </div>
                    </div>
                </div>
                
                <div id="status" class="mt-3 text-center text-sm font-bold hidden"></div>
            </div>
        </section>
    </div>
</div>

<style>
    @keyframes shimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
    }
    .animate-fade-in {
        animation: fadeIn 0.3s ease-in-out;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-5px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<script>
    const fileInput = document.getElementById('fileInput');
    const processBtn = document.getElementById('processBtn');
    const statusDiv = document.getElementById('status');
    const previewArea = document.getElementById('previewArea');
    const startNumberInput = document.getElementById('startNumberInput');
    const zipNameInput = document.getElementById('zipNameInput');
    const mediaTypeRadios = document.getElementsByName('mediaType');
    const videoWarning = document.getElementById('videoWarning');
    const videoOptions = document.getElementById('videoOptions');
    const compressVideoCheckbox = document.getElementById('compressVideo');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const sortBtn = document.getElementById('sortBtn'); 
    const selectAllBtn = document.getElementById('selectAllBtn');
    const dropZone = document.getElementById('dropZone');
    const processBtnText = document.getElementById('processBtnText');
    
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const progressPercent = document.getElementById('progressPercent');

    let ffmpeg = null; 
    let fileItems = []; 
    let isProcessingFiles = false; 
    let lastCheckedIndex = null; 

    let draggedIndices = [];
    let dragOverItem = null;
    let dropPosition = 'before';

    clearAllBtn.addEventListener('click', () => {
        fileItems = [];
        fileInput.value = ''; 
        lastCheckedIndex = null;
        updatePreview();
    });

    selectAllBtn.addEventListener('click', () => {
        const hasSelected = fileItems.some(item => item.selected && !item.error);
        const newState = !hasSelected;
        fileItems.forEach(item => {
            if (!item.error) item.selected = newState;
        });
        updatePreview();
    });

    sortBtn.addEventListener('click', () => {
        if (fileItems.length === 0) return;
        fileItems.sort((a, b) => a.file.name.localeCompare(b.file.name, undefined, { numeric: true, sensitivity: 'base' }));
        lastCheckedIndex = null; 
        updatePreview();
    });

    window.removeFile = (index) => {
        fileItems.splice(index, 1);
        if (fileItems.length === 0) {
            fileInput.value = ''; 
        }
        lastCheckedIndex = null;
        updatePreview();
    };

    const updateMediaType = () => {
        let type = 'image';
        for (const radio of mediaTypeRadios) {
            if (radio.checked) type = radio.value;
        }

        fileItems = [];
        fileInput.value = '';
        lastCheckedIndex = null;
        
        if (type === 'image') {
            fileInput.accept = 'image/*';
            videoWarning.classList.add('hidden');
            videoOptions.classList.add('hidden');
        } else {
            fileInput.accept = 'video/*';
            videoWarning.classList.remove('hidden');
            videoOptions.classList.remove('hidden');
        }
        updatePreview();
    };

    for (const radio of mediaTypeRadios) {
        radio.addEventListener('change', updateMediaType);
    }

    const getImageDimensions = (file) => {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => {
                resolve({ width: img.width, height: img.height });
                URL.revokeObjectURL(img.src); 
            };
            img.onerror = () => reject(new Error('読み込みエラー'));
            img.src = URL.createObjectURL(file);
        });
    };

    const getVideoDimensions = (file) => {
        return new Promise((resolve, reject) => {
            const video = document.createElement('video');
            video.preload = 'metadata';
            video.muted = true;
            video.playsInline = true;
            video.setAttribute('playsinline', '');

            const url = URL.createObjectURL(file);
            video.src = url;

            const checkSize = () => {
                if (video.videoWidth > 0 && video.videoHeight > 0) {
                    let d = video.duration;
                    if (!d || isNaN(d) || d === Infinity) d = 0; 
                    resolve({ width: video.videoWidth, height: video.videoHeight, duration: d });
                    URL.revokeObjectURL(url);
                    return true;
                }
                return false;
            };

            video.addEventListener('loadedmetadata', () => {
                if (!checkSize()) {
                    video.addEventListener('loadeddata', checkSize);
                }
            });

            video.addEventListener('error', () => {
                URL.revokeObjectURL(url);
                reject(new Error('動画の読み込みエラー'));
            });
        });
    };

    const getVideoThumbnail = (file) => {
        return new Promise((resolve, reject) => {
            const video = document.createElement('video');
            video.preload = 'auto'; 
            video.muted = true;
            video.playsInline = true;
            video.setAttribute('playsinline', '');

            const url = URL.createObjectURL(file);
            video.src = url;

            let captured = false;

            const captureFrame = () => {
                if (captured) return;
                if (!video.videoWidth || !video.videoHeight) return;

                captured = true;
                try {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    const ctx = canvas.getContext('2d');
                    
                    ctx.fillStyle = '#000000';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    canvas.toBlob(async (blob) => {
                        if (blob) {
                            try {
                                const buffer = await blob.arrayBuffer();
                                resolve(buffer);
                            } catch (e) {
                                reject(e);
                            }
                        } else {
                            reject(new Error('サムネイル変換エラー'));
                        }
                        URL.revokeObjectURL(url);
                    }, 'image/jpeg', 0.9);
                } catch (e) {
                    reject(e);
                    URL.revokeObjectURL(url);
                }
            };

            video.addEventListener('loadeddata', () => {
                const targetTime = Math.min(1, video.duration > 0 ? video.duration / 2 : 1);
                video.currentTime = targetTime;
            });

            video.addEventListener('seeked', () => {
                captureFrame();
            });

            const playPromise = video.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    video.pause();
                }).catch(() => {});
            }

            setTimeout(() => {
                if (!captured) {
                    if (video.readyState >= 2 && video.videoWidth > 0) {
                        captureFrame();
                    } else {
                        reject(new Error('サムネイル生成のタイムアウト'));
                        URL.revokeObjectURL(url);
                    }
                }
            }, 3000);

            video.addEventListener('error', () => {
                reject(new Error('動画の読み込みエラー'));
                URL.revokeObjectURL(url);
            });
        });
    };

    const convertToJpgArrayBuffer = (file) => {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
                
                canvas.toBlob(async (blob) => {
                    if (blob) {
                        try {
                            const buffer = await blob.arrayBuffer();
                            resolve(buffer);
                        } catch (e) {
                            reject(e);
                        }
                    } else {
                        reject(new Error('JPG変換に失敗しました'));
                    }
                }, 'image/jpeg', 0.9);
                
                URL.revokeObjectURL(img.src);
            };
            img.onerror = () => reject(new Error('画像の読み込みエラー'));
            img.src = URL.createObjectURL(file);
        });
    };

    const attachEvents = () => {
        const items = document.querySelectorAll('.preview-item');
        const checkboxes = document.querySelectorAll('.file-checkbox');
        
        checkboxes.forEach(cb => {
            cb.addEventListener('click', (e) => {
                const idx = parseInt(e.target.dataset.index, 10);
                const isChecked = e.target.checked;
                
                if (e.shiftKey && lastCheckedIndex !== null) {
                    const start = Math.min(idx, lastCheckedIndex);
                    const end = Math.max(idx, lastCheckedIndex);
                    for (let i = start; i <= end; i++) {
                        if (!fileItems[i].error) {
                            fileItems[i].selected = isChecked;
                        }
                    }
                } else {
                    fileItems[idx].selected = isChecked;
                }
                
                lastCheckedIndex = idx;
                updatePreview();
            });
        });

        items.forEach(item => {
            item.addEventListener('dragstart', (e) => {
                const idx = parseInt(item.dataset.index, 10);
                
                if (!fileItems[idx].selected) {
                    fileItems.forEach(fi => fi.selected = false);
                    fileItems[idx].selected = true;
                    document.querySelectorAll('.file-checkbox').forEach(cb => cb.checked = false);
                    document.querySelector(`.file-checkbox[data-index="${idx}"]`).checked = true;
                    document.querySelectorAll('.preview-item').forEach(li => {
                        li.classList.remove('bg-blue-50', 'border-blue-200', 'ring-1', 'ring-blue-100');
                        li.classList.add('bg-white', 'border-slate-200');
                    });
                    item.classList.add('bg-blue-50', 'border-blue-200', 'ring-1', 'ring-blue-100');
                    item.classList.remove('bg-white', 'border-slate-200');
                }
                
                draggedIndices = fileItems.map((f, i) => f.selected && !f.error ? i : -1).filter(i => i !== -1);
                
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', 'move'); 
                
                const dragBadge = document.createElement('div');
                dragBadge.className = 'bg-slate-800 text-white px-3 py-1.5 rounded-lg shadow-xl text-sm font-bold absolute flex items-center gap-1.5 pointer-events-none z-50';
                dragBadge.style.top = '-1000px';
                dragBadge.style.left = '-1000px';
                dragBadge.innerHTML = `
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"></path></svg>
                    ${draggedIndices.length}ファイルを移動
                `;
                document.body.appendChild(dragBadge);
                e.dataTransfer.setDragImage(dragBadge, 15, 15); 
                
                setTimeout(() => {
                    document.body.removeChild(dragBadge); 
                    draggedIndices.forEach(i => {
                        const el = document.querySelector(`.preview-item[data-index="${i}"]`);
                        if (el) el.classList.add('opacity-40');
                    });
                }, 0);
            });

            item.addEventListener('dragend', (e) => {
                document.querySelectorAll('.preview-item').forEach(el => {
                    el.classList.remove('opacity-40', 'drop-target-before', 'drop-target-after');
                });
                dragOverItem = null;
            });

            item.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                
                const bounding = item.getBoundingClientRect();
                const offset = bounding.y + (bounding.height / 2);
                
                if (dragOverItem && dragOverItem !== item) {
                    dragOverItem.classList.remove('drop-target-before', 'drop-target-after');
                }
                dragOverItem = item;
                
                const targetIdx = parseInt(item.dataset.index, 10);
                if (draggedIndices.includes(targetIdx)) {
                    item.classList.remove('drop-target-before', 'drop-target-after');
                    return;
                }
                
                if (e.clientY > offset) {
                    dropPosition = 'after';
                    item.classList.add('drop-target-after');
                    item.classList.remove('drop-target-before');
                } else {
                    dropPosition = 'before';
                    item.classList.add('drop-target-before');
                    item.classList.remove('drop-target-after');
                }
            });

            item.addEventListener('dragleave', (e) => {
                item.classList.remove('drop-target-before', 'drop-target-after');
            });

            item.addEventListener('drop', (e) => {
                e.preventDefault();
                item.classList.remove('drop-target-before', 'drop-target-after');
                
                const targetIdx = parseInt(item.dataset.index, 10);
                if (draggedIndices.includes(targetIdx)) return;
                
                const movingItems = draggedIndices.map(i => fileItems[i]);
                const remainingItems = fileItems.filter((_, i) => !draggedIndices.includes(i));
                
                const targetItem = fileItems[targetIdx];
                let insertIndex = remainingItems.indexOf(targetItem);
                
                if (dropPosition === 'after') {
                    insertIndex += 1;
                }
                
                remainingItems.splice(insertIndex, 0, ...movingItems);
                fileItems = remainingItems;
                lastCheckedIndex = null; 
                
                updatePreview();
            });
        });
    };

    const updatePreview = () => {
        if (fileItems.length === 0) {
            clearAllBtn.classList.add('hidden');
            sortBtn.classList.add('hidden');
            selectAllBtn.classList.add('hidden');
            previewArea.innerHTML = `
                <div class="h-full flex flex-col items-center justify-center text-slate-400 opacity-70">
                    <svg class="w-12 h-12 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    <p class="text-sm font-medium">追加されたファイルがここに表示されます</p>
                </div>`;
            
            processBtnText.textContent = `変換するファイルを追加してください`;
            processBtn.disabled = true;
            return;
        }

        clearAllBtn.classList.remove('hidden');
        selectAllBtn.classList.remove('hidden');
        
        if (fileItems.length > 1) {
            sortBtn.classList.remove('hidden');
        } else {
            sortBtn.classList.add('hidden');
        }
        
        let html = '<ul id="previewList" class="space-y-2 pb-2">';
        let count = parseInt(startNumberInput.value, 10) || 1;
        
        let type = 'image';
        for (const radio of mediaTypeRadios) {
            if (radio.checked) type = radio.value;
        }
        const prefix = type === 'image' ? 'img' : 'mov';

        for (let i = 0; i < fileItems.length; i++) {
            const item = fileItems[i];
            const file = item.file;

            if (item.error) {
                html += `
                    <li data-index="${i}" class="py-2.5 px-3 text-sm text-red-500 bg-red-50 border border-red-100 rounded-xl flex justify-between items-center group transition-colors shadow-sm">
                        <div class="flex items-center flex-1 min-w-0">
                            <svg class="w-4 h-4 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            <span class="truncate" title="${file.name}">${file.name} (サイズの取得に失敗しました)</span>
                        </div>
                        <button type="button" onclick="removeFile(${i})" class="ml-2 text-red-400 hover:text-red-700 bg-white hover:bg-red-100 rounded-lg p-1.5 transition-colors focus:outline-none flex-shrink-0" title="削除">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </li>`;
                continue;
            }
            
            // ★チェックの有無に関わらず、すべてのファイルに連番を振って変換対象とする
            const newName = `${prefix}${count}_${item.dim.width}_${item.dim.height}.${item.ext}`;
            let displayNewName = newName;
            let titleName = newName;
            let displayName = newName;
            
            if (item.isVideo) {
                const thumbName = newName.replace('.mp4', '.jpg');
                displayName = `<span class="block">${newName}</span><span class="block text-[11px] text-slate-400 mt-0.5 leading-none">+ ${thumbName}</span>`;
                titleName = `${newName} と サムネイル`;
            }
            
            count++; // すべてのファイルで連番を進める
            
            const bgClass = item.selected ? 'bg-blue-50 border-blue-200 shadow-sm ring-1 ring-blue-100' : 'bg-white border-slate-200 shadow-sm hover:border-slate-300';
            const textClass = item.selected ? 'text-slate-700' : 'text-slate-500';

            html += `
                <li data-index="${i}" draggable="true" class="preview-item p-3 text-sm flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 group ${bgClass} border rounded-xl transition-all cursor-move">
                    <div class="flex items-center sm:flex-1 min-w-0">
                        <div class="mr-3 text-slate-300 cursor-grab hover:text-slate-500 transition-colors drag-handle flex-shrink-0" title="ドラッグして移動">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16"></path></svg>
                        </div>
                        <input type="checkbox" class="file-checkbox mr-3 h-4.5 w-4.5 text-blue-600 bg-white border-slate-300 rounded focus:ring-blue-500 flex-shrink-0 cursor-pointer transition-colors" data-index="${i}" ${item.selected ? 'checked' : ''}>
                        <div class="min-w-0 flex-1">
                            <span class="${textClass} truncate block font-medium" title="${file.name}">${file.name}</span>
                            <span class="text-[10px] text-slate-400 mt-0.5 block">${(file.size / 1024 / 1024).toFixed(2)} MB</span>
                        </div>
                    </div>
                    
                    <div class="flex items-center sm:flex-1 justify-between sm:justify-end min-w-0 ml-10 sm:ml-0">
                        <div class="hidden sm:flex flex-shrink-0 text-slate-300 px-3">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </div>
                        <div class="text-blue-700 font-bold truncate sm:text-right flex-1 min-w-0" title="${titleName}">
                            ${displayName}
                        </div>
                        <button type="button" onclick="removeFile(${i})" class="ml-3 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg p-1.5 transition-colors focus:outline-none flex-shrink-0 cursor-pointer" title="削除">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                </li>`;
        }
        html += '</ul>';
        previewArea.innerHTML = html;

        const hasSelected = fileItems.some(item => item.selected && !item.error);
        selectAllBtn.textContent = hasSelected ? '選択をすべて解除' : 'すべて選択';
        
        // ★実行ボタンのテキストと状態を「すべての正常ファイル」に基づいて更新する
        const validCount = fileItems.filter(item => !item.error).length;
        if (validCount > 0) {
            processBtnText.textContent = `すべてのファイル（${validCount}件）をZIPでダウンロード`;
            processBtn.disabled = false;
        } else {
            processBtnText.textContent = `変換するファイルを追加してください`;
            processBtn.disabled = true;
        }

        attachEvents();
    };

    const handleFiles = async (newFiles) => {
        if (isProcessingFiles) return; 
        isProcessingFiles = true;

        let currentType = 'image';
        for (const radio of mediaTypeRadios) {
            if (radio.checked) currentType = radio.value;
        }

        const validFiles = Array.from(newFiles).filter(file => {
            if (currentType === 'image') return file.type.startsWith('image/');
            if (currentType === 'video') return file.type.startsWith('video/');
            return true;
        });

        if (validFiles.length < newFiles.length) {
            showStatus(`⚠️ 現在のモード（${currentType === 'image' ? '画像' : '動画'}）以外のファイルは除外されました。`, 'error');
            setTimeout(() => { statusDiv.classList.add('hidden'); }, 4000);
        }

        const existingNames = fileItems.map(item => item.file.name);
        const filesToProcess = validFiles.filter(f => !existingNames.includes(f.name));

        if (filesToProcess.length > 0) {
            showStatus('⏳ ファイルの情報を読み込み中...', 'info');
            fileInput.disabled = true;
            processBtn.disabled = true;

            const newItems = [];
            for (const file of filesToProcess) {
                let item = { file: file, selected: false, error: false }; 
                try {
                    const isVideo = file.type.startsWith('video/') || currentType === 'video';
                    item.isVideo = isVideo;
                    if (isVideo) {
                        item.dim = await getVideoDimensions(file);
                        item.ext = 'mp4';
                    } else {
                        item.dim = await getImageDimensions(file);
                        item.ext = 'jpg';
                    }
                } catch (e) {
                    item.error = true;
                }
                newItems.push(item);
            }

            fileItems = [...fileItems, ...newItems];
            fileItems.sort((a, b) => a.file.name.localeCompare(b.file.name, undefined, { numeric: true, sensitivity: 'base' }));
            lastCheckedIndex = null;

            updatePreview();

            statusDiv.classList.add('hidden');
            fileInput.disabled = false;
            processBtn.disabled = false;
        }
        
        isProcessingFiles = false;
    };

    fileInput.addEventListener('change', (e) => {
        handleFiles(e.target.files);
        fileInput.value = ''; 
    });

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('border-blue-400', 'bg-blue-50');
        dropZone.classList.remove('border-slate-300', 'bg-slate-50');
    });

    dropZone.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dropZone.classList.remove('border-blue-400', 'bg-blue-50');
        dropZone.classList.add('border-slate-300', 'bg-slate-50');
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('border-blue-400', 'bg-blue-50');
        dropZone.classList.add('border-slate-300', 'bg-slate-50');
        
        if (e.dataTransfer.files.length > 0) {
            handleFiles(e.dataTransfer.files);
        }
    });

    startNumberInput.addEventListener('input', updatePreview);

    const showStatus = (msg, type = 'info') => {
        statusDiv.textContent = msg;
        statusDiv.className = 'mt-4 text-center text-sm font-bold p-3 rounded-lg animate-fade-in ';
        if (type === 'info') statusDiv.classList.add('bg-blue-50', 'text-blue-700', 'border', 'border-blue-100');
        if (type === 'success') statusDiv.classList.add('bg-green-50', 'text-green-700', 'border', 'border-green-100');
        if (type === 'error') statusDiv.classList.add('bg-red-50', 'text-red-700', 'border', 'border-red-100');
        statusDiv.classList.remove('hidden');
    };

    const updateProgress = (percent) => {
        progressContainer.classList.remove('hidden');
        progressBar.style.width = `${percent}%`;
        progressPercent.textContent = `${percent}%`;
    };

    const hideProgress = () => {
        progressContainer.classList.add('hidden');
        progressBar.style.width = '0%';
        progressPercent.textContent = `0%`;
    };

    processBtn.addEventListener('click', async () => {
        // ★エラーのないすべてのファイルを変換対象とする
        const targetItems = fileItems.filter(item => !item.error);
        
        if (targetItems.length === 0) {
            alert('変換するファイルを追加してください。');
            return;
        }

        let type = 'image';
        for (const radio of mediaTypeRadios) {
            if (radio.checked) type = radio.value;
        }
        
        if (type === 'video' && typeof SharedArrayBuffer === 'undefined') {
            showStatus('❌ エラー: 動画変換に必要な設定が不足しています。画面上部の案内をご確認ください。', 'error');
            return;
        }

        if (typeof JSZip === 'undefined') {
            showStatus('❌ エラー: ZIP処理プログラムが読み込めませんでした。', 'error');
            return;
        }

        processBtn.disabled = true;
        fileInput.disabled = true;
        const originalBtnText = processBtnText.textContent;
        processBtnText.textContent = '処理中...';
        processBtn.classList.add('animate-pulse');
        
        showStatus('処理中... 少々お待ちください。', 'info');
        
        const zip = new JSZip();
        let count = parseInt(startNumberInput.value, 10) || 1;
        const prefix = type === 'image' ? 'img' : 'mov';

        try {
            for (const item of targetItems) {
                const dim = item.dim;
                const isVideo = item.isVideo;
                const ext = item.ext;
                const file = item.file;
                
                let arrayBuffer;

                if (isVideo) {
                    try {
                        if (!ffmpeg) {
                            progressText.textContent = '初期セットアップ中...';
                            updateProgress(0);
                            
                            ffmpeg = FFmpeg.createFFmpeg({ 
                                log: true,
                                corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js'
                            });
                            
                            ffmpeg.setProgress(({ ratio }) => {
                                if (ratio >= 0 && ratio <= 1) {
                                    const percent = Math.round(ratio * 100);
                                    progressText.textContent = `[${file.name}] を圧縮中...`;
                                    updateProgress(percent);
                                }
                            });

                            await ffmpeg.load();
                        }

                        const extMatch = file.name.match(/\.([^.]+)$/);
                        const safeFileName = 'input_' + count + (extMatch ? '.'+extMatch[1] : '');
                        
                        ffmpeg.FS('writeFile', safeFileName, await FFmpeg.fetchFile(file));
                        
                        let needsCompression = compressVideoCheckbox.checked;
                        const fileSizeMB = file.size / (1024 * 1024);
                        
                        if (needsCompression && fileSizeMB <= 9.5) {
                            needsCompression = false;
                            progressText.textContent = `[${file.name}] を高速変換中...`;
                            updateProgress(100);
                        }

                        if (needsCompression) { 
                            let videoBitrateKbps = 2000; 

                            if (dim.duration && dim.duration > 0) {
                                const targetSizeBits = 9.2 * 1024 * 1024 * 8;
                                let targetTotalBitrateKbps = Math.floor((targetSizeBits / dim.duration) / 1000);
                                videoBitrateKbps = targetTotalBitrateKbps - 96; 
                            }
                            
                            if (videoBitrateKbps > 8000) videoBitrateKbps = 8000; 
                            if (videoBitrateKbps < 200) videoBitrateKbps = 200; 
                            
                            let scaleWidth = 'trunc(iw/2)*2';
                            let scaleHeight = 'trunc(ih/2)*2';
                            
                            const vfFilter = `scale=${scaleWidth}:${scaleHeight}`;
                            
                            await ffmpeg.run(
                                '-i', safeFileName, 
                                '-vf', vfFilter,
                                '-vcodec', 'libx264',
                                '-preset', 'veryfast', 
                                '-profile:v', 'main',  
                                '-b:v', `${videoBitrateKbps}k`, 
                                '-maxrate', `${Math.floor(videoBitrateKbps * 1.1)}k`, 
                                '-bufsize', `${videoBitrateKbps * 2}k`, 
                                '-pix_fmt', 'yuv420p', 
                                '-c:a', 'aac', 
                                '-b:a', '96k', 
                                '-ac', '2', 
                                '-threads', '2', 
                                '-max_muxing_queue_size', '1024', 
                                'output.mp4'
                            );
                        } else {
                            if (!needsCompression && compressVideoCheckbox.checked) {
                                // skip
                            } else {
                                progressText.textContent = `[${file.name}] を高速変換中...`;
                                updateProgress(100);
                            }
                            await ffmpeg.run('-i', safeFileName, '-c', 'copy', 'output.mp4');
                        }
                        
                        const data = ffmpeg.FS('readFile', 'output.mp4');
                        arrayBuffer = data.buffer;
                        
                        hideProgress();
                        
                        ffmpeg.FS('unlink', safeFileName);
                        ffmpeg.FS('unlink', 'output.mp4');

                    } catch (e) {
                        console.error('動画変換失敗:', e);
                        hideProgress();
                        showStatus(`⚠️ ${file.name} はエラーのため元のサイズで保存されます。`, 'error');
                        arrayBuffer = await file.arrayBuffer();
                    }
                } else {
                    progressText.textContent = `[${file.name}] を変換中...`;
                    updateProgress(100);
                    arrayBuffer = await convertToJpgArrayBuffer(file);
                    hideProgress();
                }
                
                const newFileName = `${prefix}${count}_${dim.width}_${dim.height}.${ext}`;
                zip.file(newFileName, arrayBuffer);
                
                if (isVideo) {
                    try {
                        const thumbBuffer = await getVideoThumbnail(file);
                        const thumbFileName = `${prefix}${count}_${dim.width}_${dim.height}.jpg`;
                        zip.file(thumbFileName, thumbBuffer);
                    } catch (thumbErr) {
                        console.error('サムネイル生成エラー:', thumbErr);
                    }
                }
                
                count++;
            }

            showStatus('📦 処理完了。ZIPファイルを作成しています...', 'info');

            const zipBlob = await zip.generateAsync({ type: 'blob' });
            const downloadUrl = URL.createObjectURL(zipBlob);
            
            let zipFileName = zipNameInput.value.trim() || 'renamed_files';
            if (!zipFileName.toLowerCase().endsWith('.zip')) {
                zipFileName += '.zip';
            }
            
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = zipFileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(downloadUrl);

            // ★変換完了後は選択状態をリセットしておく
            targetItems.forEach(item => item.selected = false);
            updatePreview();

            showStatus('✅ ダウンロードが完了しました！', 'success');
            
            setTimeout(() => {
                if(statusDiv.classList.contains('bg-green-50')) {
                    statusDiv.classList.add('hidden');
                }
            }, 3000);

        } catch (error) {
            console.error(error);
            hideProgress();
            showStatus(`❌ エラーが発生しました: ${error.message}`, 'error');
        } finally {
            processBtn.disabled = false;
            fileInput.disabled = false;
            processBtnText.textContent = originalBtnText;
            processBtn.classList.remove('animate-pulse');
        }
    });
</script>

</body>
</html>
