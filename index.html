<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画像一括リネームツール</title>
    
    <!-- ★修正：外部CDNからの読み込みをやめ、同じ階層のファイルを読み込むように変更 -->
    <!-- GitHub Pagesで公開する際は、このファイルを手動で同じ場所にアップロードする必要があります -->
    <script src="coi-serviceworker.min.js"></script>
    
    <!-- Tailwind CSS (デザイン用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- JSZip (ZIPファイル作成用) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- FFmpeg.wasm (動画変換用) -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        /* ドロップ先のインジケーター用スタイル（わかりやすい太線） */
        .drop-target-before {
            box-shadow: 0 -3px 0 0 #3b82f6 !important; /* 上部に青い太線 */
            z-index: 10;
            position: relative;
        }
        .drop-target-after {
            box-shadow: 0 3px 0 0 #3b82f6 !important;  /* 下部に青い太線 */
            z-index: 10;
            position: relative;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8 font-sans text-gray-800 flex items-center justify-center">

<!-- max-w-2xl から max-w-5xl に変更して画面幅を広げました -->
<div class="bg-white w-full max-w-5xl rounded-2xl shadow-lg border border-gray-100 overflow-hidden">
    <!-- ヘッダー -->
    <div class="bg-blue-600 px-6 py-4">
        <h2 class="text-xl font-bold text-white flex items-center">
            <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            画像一括リネームツール
        </h2>
    </div>

    <div class="p-6 md:p-8">
        <!-- ファイルの種類の選択 -->
        <div class="mb-6">
            <label class="block text-sm font-bold text-gray-700 mb-3">ファイルの種類を選んでください</label>
            <div class="grid grid-cols-2 gap-4">
                <label class="cursor-pointer relative block">
                    <input type="radio" name="mediaType" value="image" class="peer sr-only" checked>
                    <div class="rounded-xl border-2 border-gray-200 bg-white p-4 sm:p-6 text-center hover:bg-gray-50 peer-checked:border-blue-500 peer-checked:bg-blue-50 transition-all [&>svg]:text-gray-400 peer-checked:[&>svg]:text-blue-500 [&>.title]:text-gray-700 peer-checked:[&>.title]:text-blue-700 [&>.desc]:text-gray-500 peer-checked:[&>.desc]:text-blue-600 shadow-sm">
                        <svg class="w-10 h-10 mx-auto mb-2 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <span class="title block text-lg font-bold transition-colors">画像</span>
                        <span class="desc block text-xs mt-1 transition-colors">JPG形式に変換<br>(接頭辞: img)</span>
                    </div>
                </label>
                <label class="cursor-pointer relative block">
                    <input type="radio" name="mediaType" value="video" class="peer sr-only">
                    <div class="rounded-xl border-2 border-gray-200 bg-white p-4 sm:p-6 text-center hover:bg-gray-50 peer-checked:border-blue-500 peer-checked:bg-blue-50 transition-all [&>svg]:text-gray-400 peer-checked:[&>svg]:text-blue-500 [&>.title]:text-gray-700 peer-checked:[&>.title]:text-blue-700 [&>.desc]:text-gray-500 peer-checked:[&>.desc]:text-blue-600 shadow-sm">
                        <svg class="w-10 h-10 mx-auto mb-2 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        <span class="title block text-lg font-bold transition-colors">動画</span>
                        <span class="desc block text-xs mt-1 transition-colors">MP4形式に変換<br>(接頭辞: mov)</span>
                    </div>
                </label>
            </div>
            
            <!-- 動画が選ばれた時のみ表示されるオプション -->
            <div id="videoOptions" class="mt-4 hidden bg-red-50 p-4 rounded-xl border border-red-100">
                <label class="flex items-center cursor-pointer">
                    <input type="checkbox" id="compressVideo" class="w-5 h-5 text-red-600 border-gray-300 rounded focus:ring-red-500" checked>
                    <span class="ml-2 text-sm text-red-900 font-bold">各動画を10MB以下に圧縮する</span>
                </label>
                <p class="text-xs text-red-600 mt-2 ml-7">※ブラウザ上で動画を再変換するため、<b>非常に時間がかかり、スマホやPCが熱くなります</b>。短い動画でのみご使用ください。</p>
            </div>
        </div>

        <!-- 出力設定 (連番とZIPファイル名) -->
        <div class="mb-6 bg-blue-50 p-4 sm:p-5 rounded-xl border border-blue-100 flex flex-col sm:flex-row flex-wrap items-start sm:items-center gap-4 sm:gap-6">
            <div class="flex items-center gap-2">
                <label for="startNumberInput" class="text-sm font-bold text-blue-900 whitespace-nowrap">開始連番:</label>
                <input type="number" id="startNumberInput" value="1" min="0" 
                       class="w-24 text-sm text-gray-700 border border-gray-300 rounded-lg p-2 focus:ring-blue-500 focus:border-blue-500 focus:outline-none">
            </div>
            <div class="flex items-center gap-2 w-full sm:w-auto">
                <label for="zipNameInput" class="text-sm font-bold text-blue-900 whitespace-nowrap">ZIPファイル名:</label>
                <input type="text" id="zipNameInput" value="renamed_files" placeholder="ファイル名を入力"
                       class="flex-1 sm:w-48 text-sm text-gray-700 border border-gray-300 rounded-lg p-2 focus:ring-blue-500 focus:border-blue-500 focus:outline-none">
                <span class="text-sm text-blue-900 font-bold whitespace-nowrap">.zip</span>
            </div>
        </div>

        <!-- ファイル選択 -->
        <div class="mb-6">
            <label id="fileInputLabel" class="block text-sm font-bold text-gray-700 mb-2">画像ファイルを選択 <span class="text-xs font-normal text-gray-500 ml-2">(img連番_横_縦 にリネームされます)</span></label>
            
            <!-- ドラッグ＆ドロップエリア -->
            <div id="dropZone" class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-gray-300 rounded-xl bg-gray-50 hover:bg-gray-100 transition-colors cursor-pointer relative overflow-hidden group">
                <div class="flex flex-col items-center justify-center pt-5 pb-6 pointer-events-none">
                    <svg class="w-8 h-8 mb-3 text-gray-400 group-hover:text-blue-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    <p class="mb-2 text-sm text-gray-500 font-semibold group-hover:text-blue-600 transition-colors">クリック または ここにファイルをドロップ</p>
                    <p class="text-xs text-gray-400">複数回のドラッグ＆ドロップでファイルを追加できます</p>
                </div>
                <input type="file" id="fileInput" accept="image/*" multiple 
                       class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
            </div>

            <p id="videoWarning" class="mt-2 text-xs text-red-500 hidden">※動画ファイルは容量が大きいため、一度に選択する数を少なめにしてください（ブラウザの動作が重くなる可能性があります）。</p>
        </div>

        <!-- プレビュー領域 -->
        <div class="mb-8">
            <div class="flex justify-between items-center mb-2">
                <label class="block text-sm font-bold text-gray-700">変換プレビュー</label>
                <!-- すべてキャンセルボタン -->
                <button id="clearAllBtn" type="button" class="text-sm text-red-500 hover:text-red-700 font-bold hidden transition-colors flex items-center focus:outline-none">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    すべてキャンセル
                </button>
            </div>
            <!-- max-h-60 から max-h-96 に変更してプレビューエリアを縦に広げました -->
            <div id="previewArea" class="bg-gray-50 border border-gray-200 rounded-xl p-4 min-h-[100px] max-h-96 overflow-y-auto">
                <p class="text-sm text-gray-400 text-center py-4">ファイルを選択すると、ここに新しいファイル名が表示されます。</p>
            </div>
        </div>

        <!-- 実行ボタン -->
        <button id="processBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-sm transition duration-150 ease-in-out flex justify-center items-center disabled:opacity-50 disabled:cursor-not-allowed">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            変換してZIPでダウンロード
        </button>
        
        <!-- ステータス表示 -->
        <div id="status" class="mt-4 text-center text-sm font-medium hidden"></div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const processBtn = document.getElementById('processBtn');
    const statusDiv = document.getElementById('status');
    const previewArea = document.getElementById('previewArea');
    const startNumberInput = document.getElementById('startNumberInput');
    const zipNameInput = document.getElementById('zipNameInput');
    const mediaTypeRadios = document.getElementsByName('mediaType');
    const fileInputLabel = document.getElementById('fileInputLabel');
    const videoWarning = document.getElementById('videoWarning');
    const videoOptions = document.getElementById('videoOptions');
    const compressVideoCheckbox = document.getElementById('compressVideo');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const dropZone = document.getElementById('dropZone');

    let ffmpeg = null; // FFmpegのインスタンスを保持
    let fileItems = []; // ファイルとメタデータを保持する配列 [{file, dim, ext, isVideo, selected, error}]
    let isProcessingFiles = false; // 連続追加防止フラグ
    let lastCheckedIndex = null; // Shift選択用

    // ドラッグ＆ドロップ用変数
    let draggedIndices = [];
    let dragOverItem = null;
    let dropPosition = 'before';

    // すべてのファイルをキャンセルする処理
    clearAllBtn.addEventListener('click', () => {
        fileItems = [];
        fileInput.value = ''; // ファイル選択欄もリセット
        lastCheckedIndex = null;
        updatePreview();
    });

    // ファイルをリストから個別に削除(キャンセル)する関数
    window.removeFile = (index) => {
        fileItems.splice(index, 1);
        if (fileItems.length === 0) {
            fileInput.value = ''; // すべて削除されたらinputもリセット
        }
        lastCheckedIndex = null;
        updatePreview();
    };

    // ファイル種類選択時の処理
    const updateMediaType = () => {
        let type = 'image';
        for (const radio of mediaTypeRadios) {
            if (radio.checked) type = radio.value;
        }

        // 種類が変更されたら、現在選択されているファイルをリセットする
        fileItems = [];
        fileInput.value = '';
        lastCheckedIndex = null;
        
        if (type === 'image') {
            fileInput.accept = 'image/*';
            fileInputLabel.innerHTML = '画像ファイルを選択 <span class="text-xs font-normal text-gray-500 ml-2">(img連番_横_縦 にリネームされます)</span>';
            videoWarning.classList.add('hidden');
            videoOptions.classList.add('hidden');
        } else {
            fileInput.accept = 'video/*';
            fileInputLabel.innerHTML = '動画ファイルを選択 <span class="text-xs font-normal text-gray-500 ml-2">(mov連番_横_縦 にリネームされます)</span>';
            videoWarning.classList.remove('hidden');
            videoOptions.classList.remove('hidden');
        }
        updatePreview();
    };

    for (const radio of mediaTypeRadios) {
        radio.addEventListener('change', updateMediaType);
    }

    // 画像のサイズを取得する関数
    const getImageDimensions = (file) => {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => {
                resolve({ width: img.width, height: img.height });
                URL.revokeObjectURL(img.src); // メモリ解放
            };
            img.onerror = () => reject(new Error('読み込みエラー'));
            img.src = URL.createObjectURL(file);
        });
    };

    // 動画のサイズを取得する関数（より確実な取得方法に改善）
    const getVideoDimensions = (file) => {
        return new Promise((resolve, reject) => {
            const video = document.createElement('video');
            video.preload = 'metadata';
            video.muted = true;
            video.playsInline = true;
            video.setAttribute('playsinline', ''); // iOS対策

            const url = URL.createObjectURL(file);
            video.src = url;

            const checkSize = () => {
                if (video.videoWidth > 0 && video.videoHeight > 0) {
                    let d = video.duration;
                    if (!d || isNaN(d) || d === Infinity) d = 0; // ★追加: durationが不正な場合の対策
                    resolve({ width: video.videoWidth, height: video.videoHeight, duration: d });
                    URL.revokeObjectURL(url);
                    return true;
                }
                return false;
            };

            video.addEventListener('loadedmetadata', () => {
                if (!checkSize()) {
                    // metadataで取れない場合はloadeddataを待つ
                    video.addEventListener('loadeddata', checkSize);
                }
            });

            video.addEventListener('error', () => {
                URL.revokeObjectURL(url);
                reject(new Error('動画の読み込みエラー'));
            });
        });
    };

    // 動画のサムネイル（キャプチャ）を生成してArrayBufferを返す関数（真っ黒問題・iOS対策版）
    const getVideoThumbnail = (file) => {
        return new Promise((resolve, reject) => {
            const video = document.createElement('video');
            video.preload = 'auto'; // 映像データを確実に読み込む
            video.muted = true;
            video.playsInline = true;
            video.setAttribute('playsinline', ''); // iOS Safari対策

            const url = URL.createObjectURL(file);
            video.src = url;

            let captured = false;

            const captureFrame = () => {
                if (captured) return;
                if (!video.videoWidth || !video.videoHeight) return;

                captured = true;
                try {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    const ctx = canvas.getContext('2d');
                    
                    // 背景を黒などで塗りつぶしておく（透過対策）
                    ctx.fillStyle = '#000000';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    canvas.toBlob(async (blob) => {
                        if (blob) {
                            try {
                                const buffer = await blob.arrayBuffer();
                                resolve(buffer);
                            } catch (e) {
                                reject(e);
                            }
                        } else {
                            reject(new Error('サムネイル変換エラー'));
                        }
                        URL.revokeObjectURL(url);
                    }, 'image/jpeg', 0.9);
                } catch (e) {
                    reject(e);
                    URL.revokeObjectURL(url);
                }
            };

            video.addEventListener('loadeddata', () => {
                // 動画の1秒目、または動画が1秒未満ならその半分の位置
                const targetTime = Math.min(1, video.duration > 0 ? video.duration / 2 : 1);
                video.currentTime = targetTime;
            });

            video.addEventListener('seeked', () => {
                // シーク完了時にキャプチャ
                captureFrame();
            });

            // iOS等でCanvasに描画されない（真っ黒になる）のを防ぐため、一瞬だけ再生・停止を試みる
            const playPromise = video.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    video.pause();
                }).catch(() => {
                    // 自動再生がブロックされた場合は無視して進行
                });
            }

            // 何らかの理由でイベントが発火しない場合の安全策（3秒後に強制キャプチャまたはエラー）
            setTimeout(() => {
                if (!captured) {
                    if (video.readyState >= 2 && video.videoWidth > 0) {
                        captureFrame();
                    } else {
                        reject(new Error('サムネイル生成のタイムアウト'));
                        URL.revokeObjectURL(url);
                    }
                }
            }, 3000);

            video.addEventListener('error', () => {
                reject(new Error('動画の読み込みエラー'));
                URL.revokeObjectURL(url);
            });
        });
    };

    // 画像をJPGに変換してArrayBufferを返す関数
    const convertToJpgArrayBuffer = (file) => {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                
                // 透過PNGなどを考慮し、背景を白で塗りつぶす
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
                
                // JPGとして出力 (品質 90%)
                canvas.toBlob(async (blob) => {
                    if (blob) {
                        try {
                            const buffer = await blob.arrayBuffer();
                            resolve(buffer);
                        } catch (e) {
                            reject(e);
                        }
                    } else {
                        reject(new Error('JPG変換に失敗しました'));
                    }
                }, 'image/jpeg', 0.9);
                
                URL.revokeObjectURL(img.src);
            };
            img.onerror = () => reject(new Error('画像の読み込みエラー'));
            img.src = URL.createObjectURL(file);
        });
    };

    // UIとドラッグイベントを初期化する関数
    const attachEvents = () => {
        const items = document.querySelectorAll('.preview-item');
        const checkboxes = document.querySelectorAll('.file-checkbox');
        
        // 各ファイルのチェックボックス (Shiftキーでの複数選択対応)
        checkboxes.forEach(cb => {
            cb.addEventListener('click', (e) => {
                const idx = parseInt(e.target.dataset.index, 10);
                const isChecked = e.target.checked;
                
                if (e.shiftKey && lastCheckedIndex !== null) {
                    // Shiftキーが押されている場合、範囲選択
                    const start = Math.min(idx, lastCheckedIndex);
                    const end = Math.max(idx, lastCheckedIndex);
                    for (let i = start; i <= end; i++) {
                        if (!fileItems[i].error) {
                            fileItems[i].selected = isChecked;
                        }
                    }
                } else {
                    // 通常のクリック
                    fileItems[idx].selected = isChecked;
                }
                
                lastCheckedIndex = idx;
                updatePreview();
            });
        });

        // ドラッグ＆ドロップ（並び替え）のイベント
        items.forEach(item => {
            item.addEventListener('dragstart', (e) => {
                const idx = parseInt(item.dataset.index, 10);
                
                // 選択されていない要素をドラッグした場合は、単一選択モードに切り替える
                if (!fileItems[idx].selected) {
                    fileItems.forEach(fi => fi.selected = false);
                    fileItems[idx].selected = true;
                    // クラスとチェック状態を即座に更新（再描画によるドラッグ中断を防ぐため手動更新）
                    document.querySelectorAll('.file-checkbox').forEach(cb => cb.checked = false);
                    document.querySelector(`.file-checkbox[data-index="${idx}"]`).checked = true;
                    document.querySelectorAll('.preview-item').forEach(li => {
                        li.classList.remove('bg-blue-50', 'border-blue-200');
                        li.classList.add('border-transparent');
                    });
                    item.classList.add('bg-blue-50', 'border-blue-200');
                    item.classList.remove('border-transparent');
                }
                
                // ドラッグ中のインデックス一覧を取得
                draggedIndices = fileItems.map((f, i) => f.selected && !f.error ? i : -1).filter(i => i !== -1);
                
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', 'move'); // 古いブラウザ対応
                
                // --- カスタムドラッグイメージ（バッジ）を作成 ---
                const dragBadge = document.createElement('div');
                dragBadge.className = 'bg-blue-600 text-white px-4 py-2 rounded-lg shadow-xl font-bold absolute flex items-center gap-2 pointer-events-none z-50';
                dragBadge.style.top = '-1000px';
                dragBadge.style.left = '-1000px';
                dragBadge.innerHTML = `
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"></path></svg>
                    ${draggedIndices.length}個のファイルを移動
                `;
                document.body.appendChild(dragBadge);
                e.dataTransfer.setDragImage(dragBadge, 15, 15); // カーソルの少し右下に表示
                
                // 元の要素を半透明にする
                setTimeout(() => {
                    document.body.removeChild(dragBadge); // ブラウザに認識させた後すぐに削除
                    draggedIndices.forEach(i => {
                        const el = document.querySelector(`.preview-item[data-index="${i}"]`);
                        if (el) el.classList.add('opacity-40');
                    });
                }, 0);
            });

            item.addEventListener('dragend', (e) => {
                document.querySelectorAll('.preview-item').forEach(el => {
                    el.classList.remove('opacity-40', 'drop-target-before', 'drop-target-after');
                });
                dragOverItem = null;
            });

            item.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                
                const bounding = item.getBoundingClientRect();
                const offset = bounding.y + (bounding.height / 2);
                
                if (dragOverItem && dragOverItem !== item) {
                    dragOverItem.classList.remove('drop-target-before', 'drop-target-after');
                }
                dragOverItem = item;
                
                const targetIdx = parseInt(item.dataset.index, 10);
                // 自分がドラッグ対象のグループなら青線を出さない
                if (draggedIndices.includes(targetIdx)) {
                    item.classList.remove('drop-target-before', 'drop-target-after');
                    return;
                }
                
                // マウス位置によって上か下かを判定
                if (e.clientY > offset) {
                    dropPosition = 'after';
                    item.classList.add('drop-target-after');
                    item.classList.remove('drop-target-before');
                } else {
                    dropPosition = 'before';
                    item.classList.add('drop-target-before');
                    item.classList.remove('drop-target-after');
                }
            });

            item.addEventListener('dragleave', (e) => {
                item.classList.remove('drop-target-before', 'drop-target-after');
            });

            item.addEventListener('drop', (e) => {
                e.preventDefault();
                item.classList.remove('drop-target-before', 'drop-target-after');
                
                const targetIdx = parseInt(item.dataset.index, 10);
                if (draggedIndices.includes(targetIdx)) return;
                
                // ドラッグされている要素を取り出す
                const movingItems = draggedIndices.map(i => fileItems[i]);
                // 残りの要素で配列を作る
                const remainingItems = fileItems.filter((_, i) => !draggedIndices.includes(i));
                
                // 挿入位置を計算
                const targetItem = fileItems[targetIdx];
                let insertIndex = remainingItems.indexOf(targetItem);
                
                if (dropPosition === 'after') {
                    insertIndex += 1;
                }
                
                // 指定位置にまとめて挿入して配列を更新
                remainingItems.splice(insertIndex, 0, ...movingItems);
                fileItems = remainingItems;
                lastCheckedIndex = null; // 順番が変わったのでリセット
                
                updatePreview();
            });
        });
    };

    // プレビューを更新する関数（完全同期処理になり一瞬で終わるようになりました）
    const updatePreview = () => {
        if (fileItems.length === 0) {
            clearAllBtn.classList.add('hidden');
            previewArea.innerHTML = '<p class="text-sm text-gray-400 text-center py-4">ファイルを選択すると、ここに新しいファイル名が表示されます。</p>';
            return;
        }

        clearAllBtn.classList.remove('hidden');
        
        let html = '<ul id="previewList" class="divide-y divide-gray-200">';
        let count = parseInt(startNumberInput.value, 10) || 1;
        
        let type = 'image';
        for (const radio of mediaTypeRadios) {
            if (radio.checked) type = radio.value;
        }
        const prefix = type === 'image' ? 'img' : 'mov';

        for (let i = 0; i < fileItems.length; i++) {
            const item = fileItems[i];
            const file = item.file;

            // エラー時の表示
            if (item.error) {
                html += `
                    <li data-index="${i}" class="py-2 text-sm text-red-500 flex justify-between items-center group hover:bg-gray-100 rounded px-2 -mx-2 transition-colors">
                        <span class="break-all sm:flex-1">${file.name} (サイズの取得に失敗しました)</span>
                        <button type="button" onclick="removeFile(${i})" class="ml-2 text-gray-400 hover:text-red-500 focus:outline-none flex-shrink-0" title="このファイルをキャンセル">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </li>`;
                continue;
            }
            
            // 正常ファイルの表示
            const newName = `${prefix}${count}_${item.dim.width}_${item.dim.height}.${item.ext}`;
            
            // プレビュー上の表示を調整（動画の場合はサムネイル画像も作られることを明記）
            let displayName = newName;
            let titleName = newName;
            if (item.isVideo) {
                const thumbName = newName.replace('.mp4', '.jpg');
                displayName = `${newName}<br><span class="text-xs text-gray-500 mt-1 inline-block">+ ${thumbName} (サムネイル)</span>`;
                titleName = `${newName} と サムネイル`;
            }
            
            const bgClass = item.selected ? 'bg-blue-50 border-blue-200' : 'hover:bg-gray-100 border-transparent';

            html += `
                <li data-index="${i}" draggable="true" class="preview-item py-2 text-sm flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 sm:gap-4 group ${bgClass} border rounded px-2 -mx-2 transition-colors cursor-move">
                    <div class="flex items-center sm:flex-1 min-w-0">
                        <span class="mr-2 text-gray-400 cursor-grab select-none drag-handle" title="ドラッグして移動">⋮⋮</span>
                        <input type="checkbox" class="file-checkbox mr-3 h-4 w-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500 flex-shrink-0 cursor-pointer" data-index="${i}" ${item.selected ? 'checked' : ''}>
                        <span class="text-gray-700 break-all" title="${file.name}">${file.name}</span>
                    </div>
                    <div class="flex items-center sm:flex-1 justify-between sm:justify-end min-w-0 ml-7 sm:ml-0">
                        <span class="hidden sm:inline text-gray-300 px-2 flex-shrink-0">➡</span>
                        <span class="text-blue-700 font-semibold break-all sm:text-right" title="${titleName}">${displayName}</span>
                        <button type="button" onclick="removeFile(${i})" class="ml-4 text-gray-400 hover:text-red-500 focus:outline-none flex-shrink-0 cursor-pointer" title="このファイルをリストから削除">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </div>
                </li>`;
            count++;
        }
        html += '</ul>';
        previewArea.innerHTML = html;

        attachEvents();
    };

    // ファイルを追加する共通処理（事前計算してキャッシュする仕組みに変更）
    const handleFiles = async (newFiles) => {
        if (isProcessingFiles) return; // 連続処理の防止
        isProcessingFiles = true;

        let currentType = 'image';
        for (const radio of mediaTypeRadios) {
            if (radio.checked) currentType = radio.value;
        }

        // 選択モードに合わないファイルを安全のために除外
        const validFiles = Array.from(newFiles).filter(file => {
            if (currentType === 'image') return file.type.startsWith('image/');
            if (currentType === 'video') return file.type.startsWith('video/');
            return true;
        });

        if (validFiles.length < newFiles.length) {
            showStatus(`⚠️ 現在のモード（${currentType === 'image' ? '画像' : '動画'}）以外のファイルは除外されました。`, 'error');
            setTimeout(() => { statusDiv.classList.add('hidden'); }, 4000);
        }

        // 重複チェック（既にリストにあるファイルは追加しない）
        const existingNames = fileItems.map(item => item.file.name);
        const filesToProcess = validFiles.filter(f => !existingNames.includes(f.name));

        if (filesToProcess.length > 0) {
            showStatus('⏳ ファイルの情報を読み込み中...', 'info');
            fileInput.disabled = true;
            processBtn.disabled = true;

            const newItems = [];
            // 追加されたファイルのメタデータを事前にすべて計算してキャッシュする
            for (const file of filesToProcess) {
                let item = { file: file, selected: false, error: false };
                try {
                    const isVideo = file.type.startsWith('video/') || currentType === 'video';
                    item.isVideo = isVideo;
                    if (isVideo) {
                        item.dim = await getVideoDimensions(file);
                        item.ext = 'mp4';
                    } else {
                        item.dim = await getImageDimensions(file);
                        item.ext = 'jpg';
                    }
                } catch (e) {
                    item.error = true;
                }
                newItems.push(item);
            }

            // 既存リストと新規追加分を結合し、全体をファイル名でソートする
            fileItems = [...fileItems, ...newItems];
            fileItems.sort((a, b) => a.file.name.localeCompare(b.file.name, undefined, { numeric: true, sensitivity: 'base' }));
            lastCheckedIndex = null; // リストが更新されたのでリセット

            updatePreview();

            statusDiv.classList.add('hidden');
            fileInput.disabled = false;
            processBtn.disabled = false;
        }
        
        isProcessingFiles = false;
    };

    // ファイル選択時と連番変更時にプレビューを更新
    fileInput.addEventListener('change', (e) => {
        handleFiles(e.target.files);
        fileInput.value = ''; // 連続で同じファイルを追加できるようにリセット
    });

    // ドラッグ＆ドロップのイベント
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('border-blue-400', 'bg-blue-50');
        dropZone.classList.remove('border-gray-300', 'bg-gray-50');
    });

    dropZone.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dropZone.classList.remove('border-blue-400', 'bg-blue-50');
        dropZone.classList.add('border-gray-300', 'bg-gray-50');
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('border-blue-400', 'bg-blue-50');
        dropZone.classList.add('border-gray-300', 'bg-gray-50');
        
        if (e.dataTransfer.files.length > 0) {
            handleFiles(e.dataTransfer.files);
        }
    });

    startNumberInput.addEventListener('input', updatePreview);

    // ステータスメッセージを表示する関数
    const showStatus = (msg, type = 'info') => {
        statusDiv.textContent = msg;
        statusDiv.classList.remove('hidden', 'text-blue-600', 'text-green-600', 'text-red-600');
        if (type === 'info') statusDiv.classList.add('text-blue-600');
        if (type === 'success') statusDiv.classList.add('text-green-600');
        if (type === 'error') statusDiv.classList.add('text-red-600');
    };

    // ZIP作成＆ダウンロード処理
    processBtn.addEventListener('click', async () => {
        if (fileItems.length === 0) {
            alert('ファイルを選択してください。');
            return;
        }

        // ★追加：動画処理時、必要な設定が完了しているか（SharedArrayBufferがあるか）チェック
        let type = 'image';
        for (const radio of mediaTypeRadios) {
            if (radio.checked) type = radio.value;
        }
        
        if (type === 'video' && typeof SharedArrayBuffer === 'undefined') {
            showStatus('❌ エラー: 動画変換に必要な設定ファイル（coi-serviceworker.min.js）が不足しています。画面上部の案内をご確認ください。', 'error');
            return;
        }

        if (typeof JSZip === 'undefined') {
            showStatus('❌ エラー: ZIP処理プログラムが読み込めませんでした。ネット接続を確認してください。', 'error');
            return;
        }

        // ボタンを無効化して連打防止
        processBtn.disabled = true;
        showStatus('処理中... 少々お待ちください。', 'info');
        
        const zip = new JSZip();
        let count = parseInt(startNumberInput.value, 10) || 1;
        const prefix = type === 'image' ? 'img' : 'mov';

        try {
            for (const item of fileItems) {
                if (item.error) continue; // エラーファイルはスキップ

                const dim = item.dim;
                const isVideo = item.isVideo;
                const ext = item.ext;
                const file = item.file;
                
                let arrayBuffer;

                // 動画の場合はFFmpegで正しくMP4コンテナに変換する
                if (isVideo) {
                    try {
                        // 初回のみFFmpegをダウンロード＆ロード
                        if (!ffmpeg) {
                            showStatus('⏳ 初回のみ: 動画変換エンジン(FFmpeg)をダウンロード中...', 'info');
                            ffmpeg = FFmpeg.createFFmpeg({ 
                                log: true,
                                corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js'
                            });
                            
                            // 進捗状況を表示するイベントを追加
                            ffmpeg.setProgress(({ ratio }) => {
                                if (ratio >= 0 && ratio <= 1) {
                                    const percent = Math.round(ratio * 100);
                                    showStatus(`⏳ 変換処理中... ${percent}% 完了 (ブラウザを閉じないでください)`, 'info');
                                }
                            });

                            await ffmpeg.load();
                        }

                        // ファイル名にスペースや特殊文字があるとエラーになる対策
                        const extMatch = file.name.match(/\.([^.]+)$/);
                        const safeFileName = 'input_' + count + (extMatch ? '.'+extMatch[1] : '');
                        
                        // FFmpegの仮想ファイルシステムに書き込む
                        ffmpeg.FS('writeFile', safeFileName, await FFmpeg.fetchFile(file));
                        
                        let needsCompression = compressVideoCheckbox.checked;
                        const fileSizeMB = file.size / (1024 * 1024);
                        
                        // 改善点1: 元のサイズが既に十分に小さい(9.5MB以下)場合は、画質劣化を防ぐため圧縮をスキップ
                        if (needsCompression && fileSizeMB <= 9.5) {
                            needsCompression = false;
                            showStatus(`⏳ ${file.name} は既に10MB以下のため、画質を保ったまま高速変換します...`, 'info');
                        }

                        if (needsCompression) { 
                            showStatus(`⏳ ${file.name} を高画質で10MB以下に圧縮中... (時間がかかります)`, 'info'); 
                            
                            let videoBitrateKbps = 2000; 

                            if (dim.duration && dim.duration > 0) {
                                // ターゲットを9.2MBに設定し、10MB制限の中で限界まで容量を画質に回す
                                const targetSizeBits = 9.2 * 1024 * 1024 * 8;
                                let targetTotalBitrateKbps = Math.floor((targetSizeBits / dim.duration) / 1000);
                                videoBitrateKbps = targetTotalBitrateKbps - 96; // 音声用に96kbpsを確保
                            }
                            
                            // 1分以内の動画想定のため、上限を8000kbps(8Mbps)まで大幅に引き上げて元の画質を維持
                            if (videoBitrateKbps > 8000) videoBitrateKbps = 8000; 
                            if (videoBitrateKbps < 200) videoBitrateKbps = 200; // 最低限の画質を担保
                            
                            // ★修正1: 処理速度を劇的に上げるため、最大解像度を1920(フルHD)から1280(HD)へ引き下げます
                            let scaleWidth = 'trunc(iw/2)*2';
                            let scaleHeight = 'trunc(ih/2)*2';
                            
                            if (dim.width > 1280 || dim.height > 1280) {
                                // 元が巨大すぎる場合は最大1280px(HD)に収めて計算量を大幅に減らす
                                if (dim.width > dim.height) {
                                    scaleWidth = '1280';
                                    scaleHeight = 'trunc((1280*ih/iw)/2)*2';
                                } else {
                                    scaleHeight = '1280';
                                    scaleWidth = 'trunc((1280*iw/ih)/2)*2';
                                }
                            }

                            if (videoBitrateKbps < 500) {
                                scaleHeight = '480';
                                scaleWidth = 'trunc((480*iw/ih)/2)*2';
                            } else if (videoBitrateKbps < 1500) {
                                scaleHeight = '720';
                                scaleWidth = 'trunc((720*iw/ih)/2)*2';
                            }
                            
                            const vfFilter = `scale=${scaleWidth}:${scaleHeight}`;
                            
                            // ★修正2: 画質を少しだけ妥協し、処理速度を優先する設定ギア(veryfast)に変更
                            await ffmpeg.run(
                                '-i', safeFileName, 
                                '-vf', vfFilter,
                                '-vcodec', 'libx264',
                                '-preset', 'veryfast', // ★ fast から veryfast に変更し、エンコード速度をアップ
                                '-profile:v', 'main',  
                                '-b:v', `${videoBitrateKbps}k`, 
                                '-maxrate', `${Math.floor(videoBitrateKbps * 1.1)}k`, 
                                '-bufsize', `${videoBitrateKbps * 2}k`, 
                                '-pix_fmt', 'yuv420p', 
                                '-c:a', 'aac', 
                                '-b:a', '96k', 
                                '-ac', '2', 
                                '-max_muxing_queue_size', '1024', 
                                'output.mp4'
                            );
                        } else {
                            if (!needsCompression && compressVideoCheckbox.checked) {
                                // メッセージは上で出しているのでスキップ
                            } else {
                                showStatus(`⏳ ${file.name} をMP4フォーマットに高速変換中...`, 'info');
                            }
                            // -c copy で画質を落とさず高速にコンテナのみMP4に変換
                            await ffmpeg.run('-i', safeFileName, '-c', 'copy', 'output.mp4');
                        }
                        
                        // 変換後のデータを読み込む
                        const data = ffmpeg.FS('readFile', 'output.mp4');
                        arrayBuffer = data.buffer;
                        
                        // メモリ解放のために一時ファイルを削除
                        ffmpeg.FS('unlink', safeFileName);
                        ffmpeg.FS('unlink', 'output.mp4');

                    } catch (e) {
                        console.error('動画のMP4変換に失敗しました:', e);
                        // ★エラー原因の修正3: なぜサイズが変わらなかったのかユーザーに明確に伝える
                        showStatus(`⚠️ ${file.name} はエラーのため圧縮できませんでした。元のサイズで保存します。`, 'error');
                        alert(`【変換エラー】\n${file.name} の圧縮中にブラウザの処理限界（メモリ不足や形式エラー）に達しました。\nファイルは圧縮されず、元のサイズのままZIPに梱包されます。`);
                        
                        // 変換失敗時のフォールバック（元のデータをそのまま使う）
                        arrayBuffer = await file.arrayBuffer();
                    }
                } else {
                    // 画像の場合はCanvasを使ってJPGに変換
                    showStatus(`⏳ ${file.name} をJPG形式に変換中...`, 'info');
                    arrayBuffer = await convertToJpgArrayBuffer(file);
                }
                
                // 横_縦 に固定
                const newFileName = `${prefix}${count}_${dim.width}_${dim.height}.${ext}`;
                
                zip.file(newFileName, arrayBuffer);
                
                // ★動画の場合はサムネイルも生成してZIPに追加する
                if (isVideo) {
                    showStatus(`⏳ ${file.name} のサムネイル画像を生成中...`, 'info');
                    try {
                        const thumbBuffer = await getVideoThumbnail(file);
                        const thumbFileName = `${prefix}${count}_${dim.width}_${dim.height}.jpg`;
                        zip.file(thumbFileName, thumbBuffer);
                    } catch (thumbErr) {
                        console.error('サムネイル生成エラー:', thumbErr);
                        showStatus(`⚠️ ${file.name} のサムネイル生成に失敗しましたが、処理は続行します。`, 'error');
                    }
                }
                
                count++;
            }

            showStatus('📦 ZIPファイルを生成中...', 'info');

            const zipBlob = await zip.generateAsync({ type: 'blob' });
            const downloadUrl = URL.createObjectURL(zipBlob);
            
            // ZIPファイル名の決定
            let zipFileName = zipNameInput.value.trim() || 'renamed_files';
            if (!zipFileName.toLowerCase().endsWith('.zip')) {
                zipFileName += '.zip';
            }
            
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = zipFileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(downloadUrl);

            showStatus('✅ 完了しました！ダウンロードを確認してください。', 'success');
        } catch (error) {
            console.error(error);
            showStatus(`❌ エラーが発生しました: ${error.message}`, 'error');
        } finally {
            // 処理が終わったらボタンを有効化
            processBtn.disabled = false;
        }
    });
</script>

</body>
</html>
